<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>重設密碼｜恆春民宿</title>
  <link rel="icon" type="image/png" href="/assets/hengchun-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="admin.css">
</head>

<body>
  <div id="toast" class="toast"></div>

  <section class="auth-view">
    <div class="auth-card">
      <img src="assets/hengchun-logo.svg" alt="恆春民宿">

      <h1>設定新密碼</h1>

      <p id="resetMessage">
        請輸入新的管理員密碼。
      </p>

      <form id="resetPasswordForm">
        <label>
          新密碼
          <div class="password-wrap">
            <input
              id="newPassword"
              type="password"
              minlength="8"
              required
              autocomplete="new-password"
            >
            <button
              type="button"
              class="password-toggle"
              id="newPasswordToggle"
            >
              顯示
            </button>
          </div>
        </label>

        <label>
          再次輸入新密碼
          <div class="password-wrap">
            <input
              id="confirmPassword"
              type="password"
              minlength="8"
              required
              autocomplete="new-password"
            >
            <button
              type="button"
              class="password-toggle"
              id="confirmPasswordToggle"
            >
              顯示
            </button>
          </div>
        </label>

        <button type="submit" id="savePasswordBtn">
          儲存新密碼
        </button>
      </form>

      <a href="admin.html">← 回登入頁</a>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="reset-password.js"></script>
</body>
</html>
